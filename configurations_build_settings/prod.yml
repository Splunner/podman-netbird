rootless_setup: true
domain_keycloak: "gwwautht2.int.splunnersystem.com"
domnain_netbird: "netbirdt2.int.splunnersystem.com"
use_letsencrypt: true   # true or false
acme_email_letsencrypt: "contact@contact.test"
# those options below are required if you generate settings
use_keycloak_IDP: true  # true or false
use_postgres_on_netbird: false
debug: true             # true or false
debug_level: DEBUG

netbird_traefik:
  image: docker.io/library/traefik:v3.6
  container_name: netbird-treafik
  ports:
    - 80:80
    - 443:443
  # used in scripts to build network services !!!  
  # Please do not touch ip configuration, otherwise you will need to update those files below
  # netbird.network.j2
  # config.j2
  # prod.yml
  network_netbird:  "netbird-tf-network:172.30.0.10"
  network_keycloak: "keycloak-tf-network"



  volumes:
    - /opt/configurations/traefik/certs:/certs
    - /opt/configurations/traefik/dynamic:/etc/traefik/dynamic:ro
    #  - netbird_traefik_letsencrypt:/letsencrypt
  socket_treafik_rootful: /run/podman/podman.sock:/var/run/docker.sock:ro
  socket_treafik_rootless: /run/user/1001/podman/podman.sock:/var/run/docker.sock:ro

  
netbird_dashboard:
  description: NetBird Dashboard
  container_name: netbird-dashboard
  image: docker.io/netbirdio/dashboard:latest
  networks:
    - netbird-tf-network
  traefik_service: netbird-traefik.service
  env_file: /opt/configurations/netbird/dashboard.env
  


netbird_server:
  description: NetBird Server
  traefik_service: netbird-traefik.service
  container_name: netbird-server
  image: docker.io/netbirdio/netbird-server:latest
  netbird_service_grp_name: netbird-grpc
  netbird_backend_name: netbird-backend
  networks: 
    - netbird-tf-network
 #   - netbird-db-postgres
  
  ports:
    - 3478:3478/udp

  volumes:
    - netbird_data:/var/lib/netbird
    - /opt/configurations/netbird/config.yaml:/etc/netbird/config.yaml

  commands:
    - --config /etc/netbird/config.yaml



postgres_db:
  description: Postgres Server for Keycloak 
  service_name: Postgres-db.service
  container_name: postgres-db
  image: docker.io/postgres:15
  # Please update keycloak network section, change here will have impact on other configurations
  network: keycloak-postgres
  env_file: "/opt/configurations/postgres/.env-postgres"
  volumes: 
    - "postgres_data:/var/lib/postgresql/data:Z"
  ports:
    - 5432:5432

  # related to postgres -env build
  postgres_db_name: keycloak
  postgres_db_username: keycloak
  postgres_db_password: "generate" # this will be generated randomly by script - plesae check the script - generator.py
  postgreS_db_port: 5432

keycloak_manager:
  description: Keycloack Manger Server
  container_name: "keycloak-manager"
  depends_on: postgres-db.service
  default_proxy_network: keycloak-tf-network
  networks:
    - keycloak-postgres
    - keycloak-tf-network
  image: quay.io/keycloak/keycloak:26.5.2
  env_file: "/opt/configurations/keycloak/.env-keycloak-manager"
  host_port: 8089
  container_port: 8080

  #env file variable
  keycloak_admin: admin
  keycloak_admin_password: admini_init

  #enable http
  kc_http_enabled: true

  #disable hostname check
  kc_hostname_strict: false

  kc_forward_proxy_value: xforwarded
  kc_http_relative_path_value: "/"

postgres_db_netbird:
  description: Postgres DB for netbird
  container_name: postgres-db-netbird
  image: docker.io/postgres:16
  network: netbird-db-postgres
  env_file: "/opt/configurations/netbird/.env-postgres-netbird"
  volumes: 
    - "postgres_data:/var/lib/postgresql/data:Z"
  ports:
    - 54355:5432
   # related to postgres -env build
  postgres_db_name: postgres
  postgres_db_username: postgres
  postgres_db_password: "generate" # this will be generated randomly by script - plesae check the script - generator.py
  postgreS_db_port: 5432
  netbird_auth_db_name:   "netbird_auth"    # db for authStore
  netbird_store_db_name:  "postgres"        # db for store (main)
  netbird_events_db_name: "netbird_events"  # db for  activityStore