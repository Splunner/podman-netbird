# Combined NetBird Server Configuration (Simplified)
# Generated by generate_config.py

server:
  listenAddress: ":80"
  exposedAddress: "" # https://domain.com:443
  stunPorts:
    - 3478
  metricsPort: 9090
  healthcheckAddress: ":9000"
  logLevel: "info"
  logFile: "console"
    # Run openssl rand -base64 32
  authSecret: "--Update-Key"  # 32-byte (256-bit) encryption key
  dataDir: "/var/lib/netbird"
  authStore:
    engine: "postgres"
    dsn: "host=postgres-db-netbird user=postgres password=(Password) dbname=netbird_auth sslmode=disable port=5432"
  auth:
    issuer: "" #example: https://domain.com/oauth2 
    signKeyRefreshEnabled: true
    localAuthDisabled: false
    dashboardRedirectURIs: 
      - "" #example: https://domain.com/nb-auth 
      - "" #example: https://domain.com/nb-silent-auth
    cliRedirectURIs:
      - "http://localhost:53000/"

  reverseProxy:
    trustedHTTPProxies:
      - "172.30.0.10/32"

  store:
    # engine: "sqlite"
    # Run openssl rand -base64 32
    encryptionKey: "--Update-Key"  # 32-byte (256-bit) encryption key
    engine: "postgres"
    dsn: "host=postgres-db-netbird user=postgres password=(Password) dbname=postgres_db port=5432"
  activityStore:
     engine: "postgres"
     dsn: "host=postgres-db-netbird user=postgres password=(Password) dbname=netbird_events sslmode=disable port=5432"